{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lost Your Way? | Urban Palate</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white">

  <div class="flex flex-col md:flex-row min-h-screen">
    
    <!-- Left: Image -->
    <div class="md:w-1/2 flex items-center justify-center p-6 bg-gray-900">
      <img src="{% static 'img/404.jpg' %}" 
           alt="Lost your way" 
           class="max-w-full max-h-[80vh] rounded-2xl shadow-lg object-contain">
    </div>

    <!-- Right: Text Content -->
    <div class="md:w-1/2 flex flex-col items-center justify-center text-center px-6 py-12 bg-gray-950">
      <h1 class="text-[6rem] md:text-[8rem] font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-red-500 to-orange-400 select-none drop-shadow-lg">
        404
      </h1>
      <h2 class="text-2xl md:text-3xl font-semibold mb-4">Oops! You wandered off the menu 🍽️</h2>
      <p class="text-gray-300 mb-8 max-w-md mx-auto leading-relaxed">
        The page you're looking for doesn’t exist — maybe it was a seasonal special or moved elsewhere.
      </p>
      <a href="/" class="px-8 py-3 bg-gradient-to-r from-red-600 to-orange-500 rounded-full shadow-lg font-medium hover:opacity-90 transition">
        Back to Home
      </a>
    </div>
  </div>

  <!-- Floating Glow Accent -->
  <div class="absolute w-[300px] h-[300px] bg-red-500/10 rounded-full blur-3xl top-20 left-1/2 transform -translate-x-1/2 animate-pulse hidden md:block"></div>

</body>
</html>
